                    CoOwnerIds:
                      - 1
                    CurrentPlayers: 1
                    MaxPlayers: 1
                    JoinKey: APIServer
                    AccVerifiedReq: Disabled
                    TeamBalance: true
                    Players:
                      - Team: Sheriff
                        Player: PlayerName:Id
                        Callsign: 5D-550
                        Location:
                          LocationX: 1084.965
                          LocationZ: 2302.28
                          PostalCode: "218"
                          StreetName: Park Street
                          BuildingNumber: "2083"
                        Permission: Normal / Server Administrator / Server Owner / Server Co-Owner / Server Moderator
                        WantedStars: 0
                    Staff:
                      Admins:
                        "54249787": Black_Hallow
                        "77573259": sli_ckk
                      Mods:
                        "2": JohnDoe
                        "3": JaneDoe
                      Helpers:
                        "168691872": Flat_bird
                    JoinLogs:
                      - Join: true
                        Timestamp: 1704614400
                        Player: PlayerName:Id
                    Queue:
                      - 1
                    KillLogs:
                      - Killed: PlayerName:Id
                        Timestamp: 1704614400
                        Killer: PlayerName:Id
                    CommandLogs:
                      - Player: PlayerName:Id
                        Timestamp: 1704614400
                        Command: ":h"
                    ModCalls:
                      - Caller: PlayerName:Id
                        Moderator: PlayerName:Id
                        Timestamp: 1704614400
                    EmergencyCalls:
                        - Team: Police
                          Caller: 68691872
                          Players:
                            - 789012
                          Position:
                            - -654.6
                            - 666.5
                          StartedAt: 1774216563
                          CallNumber: 43
                          Description: stg
                          PositionDescriptor: sdfsdfsdf
                    Vehicles:
                      - Name: Redline Fire Engine
                        Owner: Shawnyg
                        Texture: Livery Name
                        ColorHex: "#ff4444"
                        ColorName: Super Red
                BasicInfo:
                  summary: Базовая информация о сервере.
                  value:
                    Name: API Test
                    OwnerId: 1
                    CoOwnerIds:
                      - 1
                    CurrentPlayers: 1
                    MaxPlayers: 1
                    JoinKey: APIServer
                    AccVerifiedReq: Disabled
                    TeamBalance: true
                WithPlayers:
                  summary: С информацией об игроках.
                  value:
                    Name: Moscow RolePlay
                    OwnerId: 123456
                    CoOwnerIds:
                      - 789012
