                WithEmergencyCalls:
                  summary: С логами вызовов экстренных служб.
                  value:
                    Name: Moscow RolePlay
                    OwnerId: 123456
                    CoOwnerIds:
                      - 789012
                    CurrentPlayers: 50
                    MaxPlayers: 100
                    JoinKey: MRPServer
                    AccVerifiedReq: Email
                    TeamBalance: true
                    EmergencyCalls:
                      - Team: Sheriff
                        Caller: 123456
                        Players:
                          - 123456
                          - 789012
                        Position:
                          - 1084.965
                          - 2302.28
                        StartedAt: 1704614400
                        CallNumber: 42
                        Description: Robbery in progress
                        PositionDescriptor: Near Police Department
                      - Team: Police
                        Caller: 789012
                        Players:
                          - 789012
                        Position:
                          - 123.45
                          - 67.89
                        StartedAt: 1704614500
                        CallNumber: 43
