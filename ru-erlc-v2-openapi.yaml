openapi: 3.1.0
info:
  title: Moscow RolePlay API - ERLC v2 Endpoints
  description: |
    Эндпоинты для управления сервером ERLC v2 API.

    ## Что нового в API v2?

    PRC API v2 предоставляет более согласованную и простую модель запросов для разработчиков.
    Также включает запрашиваемые данные, такие как местоположение игроков и цвета транспорта!

    API v1 продолжает работать без существенных изменений.

    ## Rate Limits (Ограничения запросов)

    | Эндпоинт | Лимит |
    |----------|-------|
    | `/moscowroleplay/erlc/server/*` (кроме command) | 120 запросов/мин |
    | `/moscowroleplay/erlc/server/command` | Очередь: 100 команд |

    При превышении лимита возвращается **HTTP 429**.

    ## Формат Ответа Об Ошибке

    Все ошибки возвращаются в формате JSON с полями `code` и `message`:

    ```json
    {
        "code": 5007,
        "message": "missing_token"
    }
    ```

    ## Коды Ошибок

    ### Ошибки Аутентификации и Доступа

    | Код | Статус | Описание |
    |-----|--------|----------|
    | 5006 | 401 | invalid_master_key |
    | 5007 | 401 | missing_token |
    | 5008 | 401 | invalid_token |
    | 5009 | 403 | forbidden |
    | 5010 | 403 | api_version_forbidden |
    | 5011 | 403 | query_param_forbidden |

    ### Ошибки PRC API

    Эндпоинты используют внешний PRC API и могут возвращать ошибки:

    | Код PRC | Описание |
    |---------|----------|
    | 2002 | Invalid or expired server-key |
    | 3002 | Server is offline |
    | 4001 | Rate limited |
    | 9999 | Module out of date |

    При ошибке PRC API возвращается:

    ```json
    {
        "code": 5019,
        "message": "prc_api_error",
        "prc_code": 2002,
        "prc_message": "Invalid or expired server-key"
    }
    ```

    Базовый URL: `https://api.erlcrussia.xyz/v2`
  version: 2.0.0
servers:
  - url: https://api.erlcrussia.xyz/v2
    description: Production
tags:
  - name: ERLC v2
    description: Данные игрового сервера ER:LC v2 API и управление им.
paths:
  /moscowroleplay/erlc/server:
    get:
      tags:
        - ERLC v2
      summary: Информация о Сервере ER:LC
      description: |
        Получение общей информации о сервере ER:LC.
        
        Дополнительные поля могут быть включены путём установки query-параметров в значение 'true'.
        Все query-параметры необязательны.
      security:
        - MRPAPIKey: []
      parameters:
        - name: Players
          in: query
          description: Включить список игроков в ответ.
          required: false
          schema:
            type: boolean
        - name: Staff
          in: query
          description: Включить список персонала (Admins, Mods, Helpers) в ответ.
          required: false
          schema:
            type: boolean
        - name: JoinLogs
          in: query
          description: Включить логи входов/выходов в ответ.
          required: false
          schema:
            type: boolean
        - name: Queue
          in: query
          description: Включить данные очереди в ответ.
          required: false
          schema:
            type: boolean
        - name: KillLogs
          in: query
          description: Включить логи убийств в ответ.
          required: false
          schema:
            type: boolean
        - name: CommandLogs
          in: query
          description: Включить логи команд в ответ.
          required: false
          schema:
            type: boolean
        - name: ModCalls
          in: query
          description: Включить логи вызовов модераторов в ответ.
          required: false
          schema:
            type: boolean
        - name: EmergencyCalls
          in: query
          description: Включить логи вызовов экстренных служб в ответ.
          required: false
          schema:
            type: boolean
        - name: Vehicles
          in: query
          description: Включить список транспорта в ответ.
          required: false
          schema:
            type: boolean
      responses:
        '200':
          description: Успешный ответ с информацией о сервере. Дополнительные поля включаются только при соответствующих query-параметрах.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServerInfoV2'
