            price_buy:
              type: integer
              description: Purchase price.
              example: 1000
            price_sell:
              type: integer
              description: Sale price.
            quantity:
              type: integer
              description: Quantity.
            can_sell:
              type: boolean
              description: Can be sold.
            description:
              type: string
              description: Product description.
    StoreRemoveItemRequest:
      type: object
      description: Request to remove item from store (action=removeItem).
      required:
        - itemName
      properties:
        itemName:
          type: string
          description: Item name.
          example: "Police Badge"
    StoreBuyRequest:
