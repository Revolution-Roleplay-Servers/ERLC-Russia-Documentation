      summary: Create Ad Request
      description: |
        Create a new advertisement request.

        Available actions:
        - `create` - create request (requires userId, username, businessName, address).
      security:
        - MRPAPIKey: []
      parameters:
        - name: action
          in: query
          description: Operation type.
          required: true
          schema:
            type: string
            enum: [create]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                userId:
                  type: string
                  description: User ID.
                username:
                  type: string
                  description: Username.
                businessName:
                  type: string
                  description: Business name.
                address:
                  type: string
                  description: Business address.
            examples:
              create:
                summary: Create ad request
                value:
                  userId: "1104388035199639585"
                  username: "forziknerves"
                  businessName: "UKpanik"
                  address: "Артемовск, Площадь Ленина 5"
      responses:
        '200':
          description: Request successfully created.
          content:
            application/json:
              schema:
                type: object
              examples:
                create:
                  summary: Request created.
                  value:
                    success: true
                    userId: "1104388035199639585"
                    businessName: "UKpanik"
                    address: "Артемовск, Площадь Ленина 5"
                    adSent: true
        '400':
          description: Request error (missing required fields).
          content:
            application/json:
              schema:
                type: object
              example:
                error: "userId, username, businessName, address required"
        '401':
          $ref: '#/components/responses/UnauthorizedMissingOrInvalidToken'
        '403':
          $ref: '#/components/responses/Forbidden'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /moscowroleplay/civops/system:
    get:
      tags:
        - Moscow RolePlay Economy API V2
      summary: System Information
      description: |
        Retrieve system information and Economy API statistics.

        Available actions:
        - `stats` - general statistics (users, businesses, mafias, governmentBalance).
        - `uptime` - server uptime.
        - `dbStatus` - database connection status.

      security:
        - MRPAPIKey: []
      parameters:
        - name: action
          in: query
          description: Action type for retrieving data.
          required: true
          schema:
            type: string
            enum: [stats, uptime, dbStatus]
      responses:
        '200':
          description: Successful response with system data.
          content:
            application/json:
              schema:
                type: object
              examples:
                stats:
                  summary: System statistics.
                  value:
                    users: 216
                    businesses: 9
                    mafias: 1
                    governmentBalance: 99990000001
                    uptime: 1132.925331823
                    memory:
                      rss: 194883584
                      heapTotal: 72372224
                      heapUsed: 69451704
                      external: 6152340
                      arrayBuffers: 416832
                    timestamp: "2026-04-23T16:21:16.502Z"
                uptime:
                  summary: Uptime.
                  value:
                    uptime: 1138.501762406
                    uptimeFormatted: "0д 0ч 18м 58с"
                    timestamp: "2026-04-23T16:21:22.078Z"
                dbStatus:
                  summary: DB status.
                  value:
                    status: "connected"
                    timestamp: "2026-04-23T16:21:29.210Z"
        '400':
          description: Request error (unknown action).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedMissingOrInvalidToken'
        '403':
          $ref: '#/components/responses/Forbidden'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          description: Error checking DB status.
          content:
            application/json:
              schema:
                type: object
              examples:
                db_error:
                  summary: DB connection error.
                  value:
                    status: "disconnected"
                    error: "Connection timeout"

  /moscowroleplay/civops/health:
    get:
      tags:
        - Moscow RolePlay Economy API V2
      summary: Economy API Health Check
      description: |
        Check the availability and status of the Economy API.
        This endpoint does not require authentication.
      responses:
        '200':
          description: Economy API is available and working correctly.
          content:
            application/json:
              schema:
                type: object
              examples:
                healthy:
                  summary: System is running normally.
                  value:
                    status: "ok"
                    economy_api:
                      status: "ok"
                      service: "Economy API"
                      timestamp: "2026-04-23T16:25:50.237Z"
                      uptime: 1406.661067506
                    timestamp: "2026-04-23T16:25:50.239Z"
        '503':
          description: Economy API is unavailable.
          content:
            application/json:
              schema:
                type: object
              examples:
                unhealthy:
                  summary: System is unavailable.
                  value:
                    status: "error"
                    message: "Economy API unavailable"
                    error: "Connection timeout"

components:
  securitySchemes:
    MRPAPIKey:
      type: http
      scheme: bearer
      bearerFormat: API Key
      description: |
        API key for accessing CivOps endpoints.

        Passed in the `Authorization: Bearer <key>` header.

        REQUIRED FOR ALL CIVOPS ENDPOINTS (except /health).
  responses:
    UnauthorizedMissingOrInvalidToken:
      description: Authentication error.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/UnauthorizedError'
          examples:
            Missing Token:
              summary: No token.
              value:
                code: 5007
                message: Missing Token
            Invalid Token:
              summary: Invalid or deactivated token.
              value:
                code: 5008
                message: Invalid Token
            Invalid Master Key:
              summary: Invalid master key.
              value:
                code: 5006
                message: Invalid Master Key
    Forbidden:
      description: Access forbidden.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ForbiddenError'
          examples:
            Forbidden:
              summary: No access rights to endpoint.
              value:
                code: 5009
                message: Forbidden
            Api Version Forbidden:
              summary: Access to this API version is forbidden.
              value:
                code: 5010
                message: Api Version Forbidden
            Query Param Forbidden:
              summary: Query parameter is forbidden.
              value:
                code: 5011
                message: Query Param Forbidden
    TooManyRequests:
      description: Request limit exceeded.
      headers:
        X-RateLimit-Limit:
          description: Maximum requests per minute.
          schema:
            type: integer
            example: 60
        X-RateLimit-Remaining:
          description: Remaining number of requests.
          schema:
            type: integer
            example: 0
        Retry-After:
          description: Seconds until limit reset.
          schema:
            type: integer
            example: 30
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/RateLimitError'
          examples:
            Rate Limit Exceeded:
              summary: Request limit exceeded.
              value:
                code: 6021
                message: "Rate Limit Exceeded"
                retry_after: 30
    InternalServerError:
      description: Internal server error.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/EconomyApiError'
          examples:
            Internal Server Error Occurred:
              summary: Economy API error.
              value:
                code: 6005
                message: "Internal Server Error Occurred."
  schemas:
    ErrorResponse:
      type: object
      description: Standard error format.
      required:
        - code
        - message
      properties:
        code:
          type: integer
          description: API error code.
          example: 5007
        message:
          type: string
          description: Error message/identifier.
          example: Missing Token
    UnauthorizedError:
      type: object
      description: Authentication error (missing or invalid token).
      required:
        - code
        - message
      properties:
        code:
          type: integer
          example: 5007
        message:
          type: string
          example: Missing Token
    ForbiddenError:
      type: object
      description: Access error (forbidden).
      required:
        - code
        - message
      properties:
        code:
          type: integer
          example: 5009
        message:
          type: string
          example: Forbidden
    RateLimitError:
      type: object
      description: Request limit exceeded error.
      required:
        - code
        - message
      properties:
        code:
          type: integer
          example: 6021
        message:
          type: string
          example: Rate Limit Exceeded
        retry_after:
          type: integer
          description: Time until limit reset in seconds.
          example: 30
    EconomyApiError:
      type: object
      description: Economy API error.
      required:
        - code
        - message
      properties:
        code:
          type: integer
          example: 6010
        message:
          type: string
          example: "Business not found"
    EconomyTransferRequest:
      type: object
      description: Transfer request between users (action=transfer).
      required:
        - fromUserId
        - toUserId
        - amount
      properties:
        fromUserId:
          type: string
          description: Sender ID.
          example: "123456789"
        toUserId:
          type: string
          description: Recipient ID.
          example: "987654321"
        amount:
          type: integer
          description: Transfer amount.
          example: 1000
    EconomyUserAmountRequest:
      type: object
      description: Request with userId and amount (action=deposit, withdraw).
      required:
        - userId
        - amount
      properties:
        userId:
          type: string
          description: User ID.
          example: "123456789"
        amount:
          type: integer
          description: Operation amount.
          example: 5000
    EconomyUserTypeRequest:
      type: object
      description: Request with userId, amount and type (action=add, remove).
      required:
        - userId
        - amount
      properties:
        userId:
          type: string
          description: User ID.
          example: "123456789"
        amount:
          type: integer
          description: Operation amount.
          example: 1000
        type:
          type: string
          description: Balance type ('cash' or 'bank').
          enum: [cash, bank]
          default: cash
          example: cash
    EconomyUserOnlyRequest:
      type: object
      description: Request with only userId (action=reset).
      required:
        - userId
      properties:
        userId:
          type: string
          description: User ID.
          example: "123456789"
    EconomyResetCooldownRequest:
      type: object
      description: Cooldown reset request (action=resetCooldown).
      required:
        - userId
      properties:
        userId:
          type: string
          description: User ID.
          example: "123456789"
        command:
          type: string
          description: Command name to reset (if not specified - resets all).
          example: "work"
    UsersAddItemRequest:
      type: object
      description: Request to add item to inventory (action=addItem).
      required:
        - userId
        - item
      properties:
        userId:
          type: string
          description: User ID.
          example: "123456789"
        item:
          type: object
          description: Item to add.
          required:
            - name
          properties:
            name:
              type: string
              description: Item name.
              example: "Police Badge"
            amount:
              type: integer
              description: Quantity.
              default: 1
              example: 1
            description:
              type: string
              description: Item description.
              example: "Official police badge"
    UsersRemoveItemRequest:
      type: object
      description: Request to remove item from inventory (action=removeItem).
      required:
        - userId
        - itemName
      properties:
        userId:
          type: string
          description: User ID.
          example: "123456789"
        itemName:
          type: string
          description: Item name.
          example: "Coffee"
        amount:
          type: integer
          description: Quantity.
          default: 1
          example: 2
    UsersClearInventoryRequest:
      type: object
      description: Request to clear inventory (action=clearInventory).
      required:
        - userId
      properties:
        userId:
          type: string
          description: User ID.
          example: "123456789"
    BusinessRequestRequest:
      type: object
      description: Request to create business application (action=request).
      required:
        - userId
        - username
        - name
        - form
      properties:
        userId:
          type: string
          description: User ID.
          example: "123456789"
        username:
          type: string
          description: Username.
          example: "Player1"
        name:
          type: string
          description: Business name.
          example: "Moscow Motors"
        form:
          type: string
          description: Business form.
          example: "ООО"
        channelId:
          type: string
          description: Discord channel ID for notifications.
          example: "1417184142227144877"
    BusinessApproveRequest:
      type: object
      description: Request to approve business application (action=approve).
      required:
        - requestId
        - approverId
      properties:
        requestId:
          type: string
          description: Request ID.
          example: "req_123"
        approverId:
          type: string
          description: Approver ID.
          example: "987654321"
        ownerId:
          type: string
          description: Business owner ID.
          example: "123456789"
        ownerName:
          type: string
          description: Owner name.
          example: "Player1"
        channelId:
          type: string
          description: Discord channel ID.
        channelName:
          type: string
          description: Channel name.
        roleId:
          type: string
          description: Discord role ID.
        roleName:
          type: string
          description: Role name.
        employeeRoleId:
          type: string
          description: Employee role ID.
        employeeRoleName:
          type: string
          description: Employee role name.
        description:
          type: string
          description: Business description.
        address:
          type: string
          description: Business address.
    BusinessCreateRequest:
      type: object
      description: Request for direct business creation (action=create).
      required:
        - businessData
      properties:
        businessData:
          type: object
          description: Business data.
    BusinessIdOnlyRequest:
      type: object
      description: Request with only business ID (action=delete).
      required:
        - businessId
      properties:
        businessId:
          type: string
          description: Business ID.
          example: "biz_123"
    BusinessMoneyRequest:
      type: object
      description: Request to change business balance (action=addMoney, removeMoney).
      required:
        - businessId
        - amount
      properties:
        businessId:
          type: string
          description: Business ID.
          example: "biz_123"
        amount:
          type: integer
          description: Amount.
          example: 5000
    BusinessWithdrawRequest:
      type: object
      description: Request to withdraw money from business (action=withdraw).
      required:
        - businessId
        - amount
        - targetUserId
      properties:
        businessId:
          type: string
          description: Business ID.
          example: "biz_123"
        amount:
          type: integer
          description: Amount.
          example: 5000
        targetUserId:
          type: string
          description: Target user ID.
          example: "123456789"
    BusinessTransferRequest:
      type: object
      description: Request for transfer between businesses (action=transfer).
      required:
        - fromBusinessId
        - toBusinessId
        - amount
        - authorId
      properties:
        fromBusinessId:
          type: string
          description: Sender business ID.
          example: "biz_123"
        toBusinessId:
          type: string
          description: Recipient business ID.
          example: "biz_456"
        amount:
          type: integer
          description: Amount.
          example: 10000
        reason:
          type: string
          description: Transfer reason.
          example: "Оплата услуг"
        authorId:
          type: string
          description: Operation author ID.
          example: "123456789"
    BusinessEmployeeRequest:
      type: object
      description: Request to add employee (action=addEmployee).
      required:
        - businessId
        - userId
        - username
        - position
      properties:
        businessId:
          type: string
          description: Business ID.
          example: "biz_123"
        userId:
          type: string
          description: User ID.
          example: "123456789"
        username:
          type: string
          description: Username.
          example: "Employee1"
