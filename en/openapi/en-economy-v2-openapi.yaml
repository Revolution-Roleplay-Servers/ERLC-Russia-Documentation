          type: string
          description: Position.
          example: "Manager"
    BusinessRemoveEmployeeRequest:
      type: object
      description: Request to remove employee (action=removeEmployee).
      required:
        - businessId
        - userId
      properties:
        businessId:
          type: string
          description: Business ID.
          example: "biz_123"
        userId:
          type: string
          description: User ID.
          example: "123456789"
    BusinessProductRequest:
      type: object
      description: Request to add product (action=addProduct).
      required:
        - businessName
        - item
      properties:
        businessName:
          type: string
          description: Business name.
          example: "Moscow Motors"
        item:
          type: object
          description: Product.
          required:
            - name
            - price_buy
          properties:
            name:
              type: string
              description: Product name.
              example: "Car"
            price_buy:
              type: integer
              description: Purchase price.
              example: 50000
            price_sell:
              type: integer
              description: Sale price.
            quantity:
              type: integer
              description: Quantity.
            can_sell:
              type: boolean
              description: Can be sold.
            description:
              type: string
