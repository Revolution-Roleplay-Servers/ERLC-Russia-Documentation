openapi: 3.1.0
info:
  title: ER:LC Russia API V2 - Moscow RolePlay Economy API V2
  version: 2.0.0
servers:
  - url: https://api.erlcrussia.xyz/v2
    description: ER:LC Russia API V2
tags:
  - name: Moscow RolePlay Economy API V2
    description: Endpoints for managing economy and CivOps system.
paths:
  /moscowroleplay/civops/economy:
    get:
      tags:
        - Moscow RolePlay Economy API V2
      summary: Get Economy Data
      description: |
        Retrieve information about the server economy.

        Available actions:
        - `balance` - user balance (requires userId).
        - `leaderboard` - top users by balance (requires limit).
        - `rank` - user's rank in the leaderboard (requires userId).
        - `cooldowns` - user's command cooldowns (requires userId).
      security:
        - MRPAPIKey: []
      parameters:
        - name: action
          in: query
          description: Action type for retrieving data.
          required: true
          schema:
            type: string
            enum: [balance, leaderboard, rank, cooldowns]
        - name: userId
          in: query
          description: User ID (required for balance, rank, cooldowns).
          required: false
          schema:
            type: string
        - name: limit
          in: query
          description: Record limit for leaderboard.
          required: false
          schema:
            type: integer
            default: 10
      responses:
        '200':
          description: Successful response with economy data.
          content:
            application/json:
              schema:
                type: object
              examples:
                balance:
                  summary: User balance.
                  value:
                    userId: "1133665013794607114"
                    cash: 500
                    bank: 100000000000
                    rank: 1
                leaderboard:
                  summary: Top users by balance.
                  value:
                    count: 10
                    users:
                      - user_id: "1133665013794607114"
                        cash: 500
                        bank: 100000000000
                      - user_id: "924918625129865256"
                        cash: 10
                        bank: 100000000000
                rank:
                  summary: User's rank in the leaderboard.
                  value:
                    userId: "1133665013794607114"
                    rank: 1
                cooldowns:
                  summary: User cooldowns.
                  value:
                    userId: "1133665013794607114"
                    cooldowns:
                      - command: "работать"
                        last_used: 1776625200
                        expires_at: 1776627000
        '400':
          description: Request error (missing userId for required actions or unknown action).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedMissingOrInvalidToken'
        '403':
          $ref: '#/components/responses/Forbidden'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'
    post:
      tags:
        - Moscow RolePlay Economy API V2
      summary: Economy Operations
      description: |
        Perform operations with the economy system (transactions, transfers, etc.).

        Available actions:
        - `transfer` - transfer between users (requires fromUserId, toUserId, amount).
        - `deposit` - deposit money to bank (requires userId, amount).
        - `withdraw` - withdraw money from bank (requires userId, amount).
        - `add` - add money to user (requires userId, amount, type).
        - `remove` - remove money from user (requires userId, amount, type).
        - `reset` - reset user balance (requires userId).
        - `resetCooldown` - reset user cooldowns (requires userId, command).

        The type parameter for add/remove can be 'cash' or 'bank' (default 'cash').
      security:
        - MRPAPIKey: []
      parameters:
        - name: action
          in: query
          description: Operation type.
          required: true
          schema:
            type: string
            enum: [transfer, deposit, withdraw, add, remove, reset, resetCooldown]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
            examples:
              transfer:
                summary: Transfer between users.
                value:
                  fromUserId: "1027118272879009886"
                  toUserId: "1133665013794607114"
                  amount: 100000
              deposit:
                summary: Deposit money to bank.
                value:
                  userId: "1133665013794607114"
                  amount: 50000
              withdraw:
                summary: Withdraw money from bank.
                value:
                  userId: "1133665013794607114"
                  amount: 20000
              add:
                summary: Add money.
                value:
                  userId: "1133665013794607114"
                  amount: 5000
                  type: cash
              remove:
                summary: Remove money.
                value:
                  userId: "1133665013794607114"
                  amount: 2000
                  type: bank
              reset:
                summary: Reset balance.
                value:
                  userId: "1133665013794607114"
              resetCooldown:
                summary: Reset command cooldown.
                value:
                  userId: "1133665013794607114"
                  command: работать
      responses:
        '200':
          description: Operation successfully completed.
          content:
            application/json:
              schema:
                type: object
              examples:
                transfer:
                  summary: Successful transfer.
                  value:
                    success: true
                    fromUserId: "1027118272879009886"
                    toUserId: "1133665013794607114"
                    amount: 100000
                    newBalance:
                      cash: 104000
                      bank: 10000
                deposit:
                  summary: Successful deposit.
                  value:
                    success: true
                    userId: "1133665013794607114"
                    deposited: 50000
                    newBank: 150000
                    newCash: 3000
                withdraw:
                  summary: Successful withdrawal.
                  value:
                    success: true
                    userId: "1133665013794607114"
                    withdrawn: 50000
                    newBank: 53000
                    newCash: 100000
                add:
                  summary: Money added.
                  value:
                    success: true
                    userId: "1133665013794607114"
                    type: cash
                    amount: 5000
                    newBalance:
                      cash: 10000
                      bank: 10000
                remove:
                  summary: Money removed.
                  value:
                    success: true
                    userId: "1133665013794607114"
                    type: bank
                    amount: 2000
                    newBalance:
                      cash: 5000
                      bank: 8000
                reset:
                  summary: Balance reset.
                  value:
                    success: true
                    userId: "1133665013794607114"
                    newBalance:
                      cash: 0
                      bank: 0
                resetCooldown:
                  summary: Cooldown reset.
                  value:
                    success: true
                    userId: "1133665013794607114"
                    command: работать
        '400':
          description: Request error (missing required fields or unknown action).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedMissingOrInvalidToken'
        '403':
          $ref: '#/components/responses/Forbidden'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /moscowroleplay/civops/users:
    get:
      tags:
        - Moscow RolePlay Economy API V2
      summary: Get User Data
      description: |
        Retrieve user inventory and transaction history.

        Available actions:
        - `inventory` - user inventory (requires userId).
        - `transactions` - transaction history (requires userId, page, limit).

      security:
        - MRPAPIKey: []
      parameters:
        - name: action
          in: query
          description: Action type for retrieving data.
          required: true
          schema:
            type: string
            enum: [inventory, transactions]
        - name: userId
          in: query
          description: User ID (required).
          required: false
          schema:
            type: string
        - name: limit
          in: query
          description: Record limit for transactions.
          required: false
          schema:
            type: integer
            default: 15
        - name: page
          in: query
          description: Page number for transactions.
          required: false
          schema:
            type: integer
            default: 1
      responses:
        '200':
          description: Successful response with user data.
          content:
            application/json:
              schema:
                type: object
              examples:
                inventory:
                  summary: User inventory.
                  value:
                    userId: "1133665013794607114"
                    inventory:
                      - name: "Элитный Класс"
                        amount: 1
                        description: "Получите роль \"Элитный Класс\", чтобы продемонстрировать свое богатство."
                      - name: "Петух"
                        amount: 5
                        description: "Надежный петух, с помощью которого вы можете выиграть (или проиграть) петушиный бой."
                transactions:
                  summary: Purchase history from businesses.
                  value:
                    userId: "1133665013794607114"
                    page: 1
                    total: 150
                    transactions:
                      - id: 302
                        user_id: "1133665013794607114"
                        business_id: "2TAH37"
                        business_name: "Вкусно и точка"
                        item_name: "Напиток на выбор"
                        item_description: "Напиток на выбор из нескольких позиций: Спрайт, Добрый Кола, Фанта, Вишневая Кола, Липтон Зеленый, Липтон Чёрный"
                        price: 55
                        ts: 1762088809
        '400':
          description: Request error (missing userId or unknown action).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                Missing Discord Id:
                  summary: Missing userId.
                  value:
                    error: "userId required"
        '401':
          $ref: '#/components/responses/UnauthorizedMissingOrInvalidToken'
        '403':
          $ref: '#/components/responses/Forbidden'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'
    post:
      tags:
        - Moscow RolePlay Economy API V2
      summary: User Inventory Operations
      description: |
        Manage user inventory.

        Available actions:
        - `addItem` - add item to inventory (requires userId, item).
        - `removeItem` - remove item from inventory (requires userId, itemName, amount).
        - `clearInventory` - clear entire inventory (requires userId).
      security:
        - MRPAPIKey: []
      parameters:
        - name: action
          in: query
          description: Operation type.
          required: true
          schema:
            type: string
            enum: [addItem, removeItem, clearInventory]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
            examples:
              addItem:
                summary: Add item.
                value:
                  userId: "1133665013794607114"
                  item:
                    name: "Петух"
                    amount: 1
                    description: "Надежный петух, с помощью которого вы можете выиграть (или проиграть) петушиный бой."
              removeItem:
                summary: Remove item.
                value:
                  userId: "1133665013794607114"
                  itemName: "Элитный Класс"
                  amount: 1
              clearInventory:
                summary: Clear inventory
                value:
                  userId: "1133665013794607114"
      responses:
        '200':
          description: Operation successfully completed.
          content:
            application/json:
              schema:
                type: object
              examples:
                addItem:
                  summary: Item added.
                  value:
                    success: true
                    userId: "1133665013794607114"
                    item: "Петух"
                    amount: 1
                removeItem:
                  summary: Item removed.
                  value:
                    success: true
                    userId: "1133665013794607114"
                    item: "Элитный Класс"
                    amount: 1
                clearInventory:
                  summary: Inventory cleared.
                  value:
                    success: true
                    userId: "1133665013794607114"
                    action: "inventory_cleared"
        '400':
          description: Request error (missing required fields or unknown action).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedMissingOrInvalidToken'
        '403':
          $ref: '#/components/responses/Forbidden'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'

