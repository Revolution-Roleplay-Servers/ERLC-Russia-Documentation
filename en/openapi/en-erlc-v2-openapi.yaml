                        WantedStars: 0
                    Staff:
                      Admins:
                        "54249787": Black_Hallow
                        "77573259": sli_ckk
                      Mods:
                        "2": JohnDoe
                        "3": JaneDoe
                      Helpers:
                        "168691872": Flat_bird
