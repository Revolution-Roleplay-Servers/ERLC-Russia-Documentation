components:
  securitySchemes:
    MRPAPIKey:
      type: http
      scheme: bearer
      bearerFormat: API Key
      description: |
        Standard API key for accessing ER:LC endpoints.

        Passed in `Authorization: Bearer <key>` header.

        REQUIRED FOR ALL ER:LC ENDPOINTS.
  responses:
    BadRequest:
      description: Bad request.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    UnauthorizedMissingOrInvalidToken:
      description: Authentication error.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/UnauthorizedError'
          examples:
            missing_token:
              summary: No token.
              value:
                code: 5007
                message: missing_token
            invalid_token:
              summary: Invalid or deactivated token.
              value:
                code: 5008
                message: invalid_token
            invalid_master_key:
              summary: Invalid master key.
              value:
                code: 5006
                message: invalid_master_key
    Forbidden:
      description: Access forbidden.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ForbiddenError'
          examples:
            forbidden:
              summary: No access rights to endpoint.
              value:
                code: 5009
                message: forbidden
            api_version_forbidden:
              summary: Access to this API version is forbidden.
              value:
                code: 5010
                message: api_version_forbidden
            query_param_forbidden:
              summary: Query parameter is forbidden.
              value:
                code: 5011
                message: query_param_forbidden
    NotFound:
      description: Not found.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            discord_id_not_found:
              summary: Discord ID not found.
              value:
                code: 5012
                message: discord_id_not_found
            token_not_found:
              summary: Token not found.
              value:
                code: 5013
                message: token_not_found
    TooManyRequests:
      description: Request limit exceeded (120/min) or spam detected (400+ excess requests).
      headers:
        X-RateLimit-Limit:
          description: Maximum requests per minute.
          schema:
            type: integer
            example: 120
        X-RateLimit-Remaining:
          description: Remaining requests.
          schema:
            type: integer
            example: 0
        X-RateLimit-Reset:
          description: Unix timestamp (ms) when limit resets.
          schema:
            type: integer
            example: 1740339600000
        Retry-After:
          description: Seconds until limit resets.
          schema:
            type: integer
            example: 45
      content:
        application/json:
          schema:
            oneOf:
              - $ref: '#/components/schemas/RateLimitError'
              - $ref: '#/components/schemas/SpamBlockedError'
          examples:
            rate_limit_exceeded:
              summary: Exceeded 120 requests/min limit.
              value:
                code: 5016
                message: rate_limit_exceeded
                retry_after: 45
                details:
                  limit: 120
                  count: 125
                  excess: 5
                  reset_at: 1740339600000
            spam_blocked:
              summary: Spam ban (400+ excess requests).
              value:
                code: 5023
                message: spam_blocked
                blocked_until: 1740339900000
                remaining_seconds: 300
    PRCAPIError:
      description: Error from external PRC API (ER:LC).
      content:
        application/json:
          schema:
            type: object
            properties:
              code:
                type: integer
                example: 5019
              message:
                type: string
                example: prc_api_error
              prc_code:
                type: integer
                description: PRC API error code.
              prc_message:
                type: string
                description: Error description.
          examples:
            expired_server_key:
              summary: Server-Key invalid or expired.
              value:
                code: 5019
                message: prc_api_error
                prc_code: 2002
                prc_message: Invalid or expired server-key
            server_offline:
              summary: Server offline (no players).
              value:
                code: 5019
                message: prc_api_error
                prc_code: 3002
                prc_message: Server is offline (no players)
            module_outdated:
              summary: Server module is outdated.
              value:
                code: 5019
                message: prc_api_error
                prc_code: 9999
                prc_message: In-game server module is out of date
    InternalServerError:
      description: Internal server error.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            server_error:
              summary: External ER:LC API error.
              value:
                code: 5018
                message: server_error
    SpamDetectedLevel1:
      description: Suspicious activity (500+ requests/sec). 5 minute ban.
      content:
        application/json:
          schema:
            type: object
            properties:
              code:
                type: integer
                example: 5020
              message:
                type: string
                example: spam_detected_level_1
              blocked_until:
                type: string
                format: date-time
                description: Ban end time.
              remaining_seconds:
                type: integer
                description: Remaining ban time in seconds.
          examples:
            spam_level_1:
              value:
                code: 5020
                message: spam_detected_level_1
                blocked_until: "2026-02-23T12:35:00.000Z"
                remaining_seconds: 300
    SpamDetectedLevel2:
      description: Server attack (5000+ requests/sec). 15 minute ban.
      content:
        application/json:
          schema:
            type: object
            properties:
              code:
                type: integer
                example: 5021
              message:
                type: string
                example: spam_detected_level_2
              blocked_until:
                type: string
                format: date-time
                description: Ban end time.
              remaining_seconds:
                type: integer
                description: Remaining ban time in seconds.
          examples:
            spam_level_2:
              value:
                code: 5021
                message: spam_detected_level_2
                blocked_until: "2026-02-23T12:45:00.000Z"
                remaining_seconds: 900
    SpamDetectedLevel3:
      description: Critical attack (100000+ requests/sec). 60 minute ban.
      content:
        application/json:
          schema:
            type: object
            properties:
              code:
                type: integer
                example: 5022
              message:
                type: string
                example: spam_detected_level_3
              blocked_until:
                type: string
                format: date-time
                description: Ban end time.
              remaining_seconds:
                type: integer
                description: Remaining ban time in seconds.
          examples:
            spam_level_3:
              value:
                code: 5022
                message: spam_detected_level_3
                blocked_until: "2026-02-23T13:30:00.000Z"
                remaining_seconds: 3600
    SpamBlocked:
      description: Active spam ban. Request from blocked client.
      content:
        application/json:
          schema:
            type: object
            properties:
              code:
                type: integer
                example: 5023
              message:
                type: string
                example: spam_blocked
              blocked_until:
                type: string
                format: date-time
                description: Ban end time.
              remaining_seconds:
                type: integer
                description: Remaining ban time in seconds.
          examples:
            spam_blocked:
              value:
                code: 5023
                message: spam_blocked
                blocked_until: "2026-02-23T12:35:00.000Z"
                remaining_seconds: 245
  schemas:
    ErrorResponse:
      type: object
      description: Standard error format.
      required:
        - code
        - message
      properties:
        code:
          type: integer
          description: API error code.
          example: 5007
        message:
          type: string
          description: Error message/identifier.
          example: missing_token
    UnauthorizedError:
      type: object
      description: Authentication error (missing or invalid token).
      required:
        - code
        - message
      properties:
        code:
          type: integer
          example: 5007
        message:
          type: string
          example: missing_token
    ForbiddenError:
      type: object
      description: Access error (forbidden).
      required:
        - code
        - message
      properties:
        code:
          type: integer
          example: 5009
        message:
          type: string
          example: forbidden
    RateLimitError:
      type: object
      description: Request limit exceeded error (120/min). Returns details with counter info.
      required:
        - code
        - message
        - retry_after
        - details
      properties:
        code:
          type: integer
          example: 5016
        message:
          type: string
          example: rate_limit_exceeded
        retry_after:
          type: integer
          description: Time until limit resets in seconds.
          example: 45
        details:
          type: object
          properties:
            limit:
              type: integer
              description: Request limit per minute.
              example: 120
            count:
              type: integer
              description: Current request count.
              example: 125
            excess:
              type: integer
              description: Excess requests (over limit).
              example: 5
            reset_at:
              type: integer
              description: Unix timestamp (ms) of limit reset.
              example: 1740339600000
    SpamBlockedError:
      type: object
      description: Spam ban. Issued at 400+ excess requests. 5 minute ban + additional minutes for continued spam.
      required:
        - code
        - message
        - blocked_until
        - remaining_seconds
      properties:
        code:
          type: integer
          example: 5023
        message:
          type: string
          example: spam_blocked
        blocked_until:
          type: integer
          description: Unix timestamp (ms) of ban end.
          example: 1740339900000
        remaining_seconds:
          type: integer
          description: Seconds until unban.
          example: 300
