        **ENDPOINT DISABLED** - Returns error 500.
        
        Get general information about ER:LC server (online, name, status, etc.).
      deprecated: true
      security:
        - MRPAPIKey: []
      responses:
        '500':
          description: Endpoint disabled/deprecated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
