      description: >
        **ENDPOINT DISABLED** - Returns error 500.
        
        Sends a command for execution on ER:LC server.


        Commands are added to global queue with maximum command limit.


        **Note:** This endpoint is **not subject** to Rate Limiting (120 requests/min).
      deprecated: true
      security:
        - MRPAPIKey: []
      requestBody:
        required: true
        description: Object with Command Text.
        content:
          application/json:
            schema:
              type: object
              required:
                - command
              properties:
                command:
                  type: string
                  example: ':h Test API'
      responses:
